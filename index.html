```
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,194,255,0.08) 0%, transparent 70%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.02) 40px);
}

/* ─── HEADER ─────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,30,48,0.8);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--accent), #0077a8);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.logo h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--accent);
}

.logo span {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  display: block;
  margin-top: -4px;
}

.status-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  background: rgba(0,229,160,0.1);
  border: 1px solid rgba(0,229,160,0.3);
  color: var(--success);
  letter-spacing: 1px;
}

/* ─── MAIN LAYOUT ─────────────────────────── */
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 24px;
}

/* ─── VESSEL SELECTOR ─────────────────────── */
.vessel-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.vessel-bar label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.vessel-select {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}

.vessel-select:focus {
  border-color: var(--accent);
}

/* ─── CARDS ───────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px;
  margin-bottom: 24px;
}

.card-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card-title::before {
  content: '';
  width: 16px;
  height: 2px;
  background: var(--accent);
  display: inline-block;
}

/* ─── FORM ────────────────────────────────── */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group.full { grid-column: 1 / -1; }

.form-group label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.form-group input,
.form-group textarea,
.form-group select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: vertical;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,194,255,0.08);
}

.form-group textarea { min-height: 80px; }

.btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-primary {
  background: var(--accent);
  color: #07111f;
  font-weight: 600;
}

.btn-primary:hover {
  background: #33cfff;
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(0,194,255,0.25);
}

.btn-primary:active { transform: translateY(0); }

/* ─── FILTERS ─────────────────────────────── */
.filter-row {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.filter-btn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn.active,
.filter-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,194,255,0.08);
}

/* ─── LOG ENTRIES ─────────────────────────── */
#maintenanceList {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.entry-item {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  transition: border-color 0.2s;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.entry-item:hover { border-color: rgba(0,194,255,0.3); }

.entry-type-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.entry-body { flex: 1; }

.entry-title {
  font-weight: 600;
  font-size: 15px;
  margin-bottom: 4px;
}

.entry-notes {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 8px;
  line-height: 1.5;
}

.entry-meta {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
}

.meta-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--muted);
}

.badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 3px 9px;
  border-radius: 12px;
}

.badge-engine  { background: rgba(255,107,53,0.15);  color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }
.badge-hull    { background: rgba(0,194,255,0.12);   color: var(--accent);  border: 1px solid rgba(0,194,255,0.25); }
.badge-elec    { background: rgba(255,200,0,0.12);   color: #ffc800;        border: 1px solid rgba(255,200,0,0.25); }
.badge-safety  { background: rgba(0,229,160,0.12);   color: var(--success); border: 1px solid rgba(0,229,160,0.25); }
.badge-other   { background: rgba(90,122,150,0.15);  color: var(--muted);   border: 1px solid rgba(90,122,150,0.3); }

.delete-btn {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 16px;
  padding: 4px;
  border-radius: 6px;
  transition: color 0.2s, background 0.2s;
  flex-shrink: 0;
}

.delete-btn:hover {
  color: var(--danger);
  background: rgba(255,77,109,0.1);
}

/* ─── EMPTY STATE ─────────────────────────── */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 40px; margin-bottom: 12px; }

.empty p {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  letter-spacing: 2px;
}

/* ─── STATS ROW ───────────────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 24px;
}

.stat-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  text-align: center;
}

.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--accent);
  line-height: 1;
}

.stat-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 4px;
}

/* ─── LOADING ─────────────────────────────── */
.loading {
  text-align: center;
  padding: 40px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 2px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

@media (max-width: 600px) {
  .form-grid { grid-template-columns: 1fr; }
  .stats-row { grid-template-columns: 1fr 1fr; }
  header { padding: 16px; }
}

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
  const supabaseClient = supabase.createClient(
    "https://racmzlcntqxmccdfnlkw.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJhY216bGNudHF4bWNjZGZubGt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MzMzMjMsImV4cCI6MjA4NjQwOTMyM30.A27vHaWszlrxYoR7iW5q8ZLgN4UJwNoTrXIekgNa8mA"
  );

  let allData = [];
  let activeFilter = 'all';

  const categoryColors = {
    engine:     'badge-engine',
    hull:       'badge-hull',
    electrical: 'badge-elec',
    safety:     'badge-safety',
    other:      'badge-other',
  };

  const dotColors = {
    engine:     '#ff6b35',
    hull:       '#00c2ff',
    electrical: '#ffc800',
    safety:     '#00e5a0',
    other:      '#5a7a96',
  };

  function setFilter(cat, btn) {
    activeFilter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  }

  function updateStats(data) {
    document.getElementById('statTotal').textContent = data.length;

    const now = new Date();
    const thisMonth = data.filter(e => {
      const d = new Date(e.created_at);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    }).length;
    document.getElementById('statMonth').textContent = thisMonth;

    if (data.length > 0) {
      const latest = new Date(data[0].created_at);
      const diffDays = Math.floor((now - latest) / (1000 * 60 * 60 * 24));
      document.getElementById('statLast').textContent = diffDays;
    } else {
      document.getElementById('statLast').textContent = '—';
    }
  }

  function renderList() {
    const list = document.getElementById('maintenanceList');
    list.innerHTML = '';

    const filtered = activeFilter === 'all'
      ? allData
      : allData.filter(e => e.category === activeFilter);

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🔧</div>
          <p>NO ENTRIES FOUND</p>
        </div>`;
      return;
    }

    filtered.forEach(entry => {
      const li = document.createElement('li');
      li.className = 'entry-item';

      const cat = entry.category || 'other';
      const badgeClass = categoryColors[cat] || 'badge-other';
      const dotColor = dotColors[cat] || '#5a7a96';
      const date = new Date(entry.created_at).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric'
      });

      li.innerHTML = `
        <div class="entry-type-dot" style="background:${dotColor};box-shadow:0 0 6px ${dotColor}55;"></div>
        <div class="entry-body">
          <div class="entry-title">${escHtml(entry.title)}</div>
          ${entry.notes ? `<div class="entry-notes">${escHtml(entry.notes)}</div>` : ''}
          <div class="entry-meta">
            <span class="meta-tag">${date}</span>
            <span class="badge ${badgeClass}">${cat.toUpperCase()}</span>
          </div>
        </div>
        <button class="delete-btn" onclick="deleteMaintenance(${entry.id})" title="Delete">✕</button>
      `;
      list.appendChild(li);
    });
  }

  async function loadMaintenance() {
    document.getElementById('maintenanceList').innerHTML = '<div class="loading">LOADING DATA...</div>';

    const { data, error } = await supabaseClient
      .from('maintenance')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      document.getElementById('maintenanceList').innerHTML = `<div class="empty"><p>ERROR: ${error.message}</p></div>`;
      return;
    }

    allData = data || [];
    updateStats(allData);
    renderList();
  }

  async function addMaintenance() {
    const title    = document.getElementById('maintTitle').value.trim();
    const notes    = document.getElementById('maintNotes').value.trim();
    const category = document.getElementById('maintCategory').value;

    if (!title) {
      document.getElementById('maintTitle').focus();
      document.getElementById('maintTitle').style.borderColor = 'var(--danger)';
      setTimeout(() => document.getElementById('maintTitle').style.borderColor = '', 1500);
      return;
    }

    const btn = document.querySelector('.btn-primary');
    btn.textContent = 'SAVING...';
    btn.disabled = true;

    const { error } = await supabaseClient
      .from('maintenance')
      .insert([{ title, notes, category }]);

    btn.textContent = '+ Add Entry';
    btn.disabled = false;

    if (error) {
      alert('Insert error: ' + error.message);
      return;
    }

    document.getElementById('maintTitle').value = '';
    document.getElementById('maintNotes').value = '';
    document.getElementById('maintCategory').value = 'engine';

    loadMaintenance();
  }

  async function deleteMaintenance(id) {
    if (!confirm('Delete this maintenance entry?')) return;

    const { error } = await supabaseClient
      .from('maintenance')
      .delete()
      .eq('id', id);

    if (error) { alert('Delete error: ' + error.message); return; }
    loadMaintenance();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadMaintenance();
</script>
